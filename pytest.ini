[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks integration tests that exercise multiple modules
    sim: marks tests that run simulated inference (may be slower)

# Show summary of skipped/failed tests
addopts = -v --tb=short --strict-markers
